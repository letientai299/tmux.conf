# vim: ft=tmux
# copy.conf — clipboard and vi copy-mode bindings
# Docs: https://man.openbsd.org/tmux#WINDOWS_AND_PANES (copy mode section)

# Use OSC 52 to write selections to the system clipboard.
# Works over SSH — the terminal handles the clipboard, not tmux.
# https://man.openbsd.org/tmux#set-clipboard
set -s set-clipboard on

# Enter copy mode with prefix v (like vi visual mode).
bind v copy-mode

# Vi-style selection and yank inside copy mode.
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
