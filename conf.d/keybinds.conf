# vim: ft=tmux
# keybinds.conf — splits, pane resize, config reload
# Docs: https://man.openbsd.org/tmux#KEY_BINDINGS

# Intuitive split keys. -c keeps the working directory.
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Resize panes with Shift+hjkl. -r makes them repeatable — hold prefix
# then tap H/J/K/L multiple times within repeat-time (default 500ms).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Session/window/pane picker — fzf in a popup, replaces choose-tree.
# Requires tmux 3.2+ (display-popup) and fzf.
run-shell 'tmux bind s display-popup -w 90% -h 90% -E "$TMUX_CONF_DIR/conf.d/fzf-picker.sh"'

# Pane content extractor — URLs, paths, git hashes, IPs via fzf.
# Requires tmux 3.2+ (display-popup) and fzf (checked inside the script).
run-shell 'tmux bind C-e display-popup -E -w 80% -h 60% "$TMUX_CONF_DIR/conf.d/extractor.sh #{pane_id}"'

# Reload config. Uses run-shell so $TMUX_CONF_DIR resolves at runtime.
run-shell 'tmux bind R source-file "$TMUX_CONF_DIR/tmux.conf" \\\; display Reloaded'
