# vim: ft=tmux
# keybinds.conf — splits, pane resize, config reload
# Docs: https://man.openbsd.org/tmux#KEY_BINDINGS

# Intuitive split keys. -c keeps the working directory.
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Resize panes with Shift+hjkl. -r makes them repeatable — hold prefix
# then tap H/J/K/L multiple times within repeat-time (default 500ms).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config. Uses run-shell so $TMUX_CONF_DIR resolves at runtime.
run-shell 'tmux bind R source-file "$TMUX_CONF_DIR/tmux.conf" \\\; display Reloaded'
