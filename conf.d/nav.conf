# vim: ft=tmux
# nav.conf — pane focus and swap bindings
# Docs: https://man.openbsd.org/tmux#select-pane
#        https://man.openbsd.org/tmux#swap-pane

# Focus pane with Ctrl+hjkl. Not repeatable — avoids the problem where
# a follow-up keypress (within repeat-time) is captured as another
# prefixed command instead of going to the shell.
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R

# Swap/move pane with hjkl. Swaps the current pane with the neighbour
# in the given direction using tmux token targets.
# https://man.openbsd.org/tmux#_lbrace_
bind h swap-pane -s '{left-of}'
bind j swap-pane -s '{down-of}'
bind k swap-pane -s '{up-of}'
bind l swap-pane -s '{right-of}'
