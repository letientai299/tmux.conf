# vim: ft=tmux
# theme.conf — status line and window tab styling
# Docs: https://man.openbsd.org/tmux#STYLES
#        https://man.openbsd.org/tmux#window-status-format

# Refresh status line every 2 seconds (default: 15).
# Keeps window tab names (pane_current_path) up to date.
set -g status-interval 2

# Status bar background — visually separates tab bar from window content.
set -g status-style 'bg=colour236,fg=colour245'

# Left: session name + single fixed-width (6 char) mode indicator.
# Priority: PREFIX > pane mode (COPY/TREE/VIEW/BUFR/CLNT) > ZOOM > NORMAL.
# All 5 tmux pane modes: copy-mode, view-mode, tree-mode, buffer-mode, client-mode.
set -g status-left ' [#{session_name}] #{?client_prefix,#[fg=colour1]PREFIX,#{?pane_in_mode,#{?#{==:#{pane_mode},copy-mode},#[fg=colour5] COPY ,#{?#{==:#{pane_mode},view-mode},#[fg=colour6] VIEW ,#{?#{==:#{pane_mode},tree-mode},#[fg=colour2] TREE ,#{?#{==:#{pane_mode},buffer-mode},#[fg=colour3] BUFR ,#{?#{==:#{pane_mode},client-mode},#[fg=colour3] CLNT ,#[fg=colour5] MODE }}}}},#{?window_zoomed_flag,#[fg=colour3] ZOOM ,#[fg=colour245]NORMAL}}} '
set -g status-left-style 'fg=colour4,bold'
set -g status-left-length 40

# Right: sudo indicator + hostname + clock.
# sudo indicator: checks if the active pane's shell has a cached sudo ticket.
set -g status-right '#{?pane_mode,,#(sudo -n true 2>/dev/null && echo "sudo " || echo "")}#H %H:%M '
set -g status-right-style 'fg=colour245'

# Window tabs: show index and directory basename + command.
# Inactive tabs are dim, active tab is highlighted.
set -g window-status-format ' #I: #{b:pane_current_path} ~ #W '
set -g window-status-current-format ' #I: #{b:pane_current_path} ~ #W '
set -g window-status-current-style 'bg=colour238,fg=colour4,bold'
set -g window-status-style 'bg=colour234,fg=colour245'
set -g window-status-separator ''

# Pane borders — subtle.
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour4'
