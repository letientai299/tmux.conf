# vim: ft=tmux
# theme.conf — status line and window tab styling (Atom One Dark)
# Colors are defined in palette.sh and applied by theme-apply.sh.
# Palette: https://github.com/atom/one-dark-syntax
# Docs: https://man.openbsd.org/tmux#STYLES
#        https://man.openbsd.org/tmux#window-status-format

# Refresh status line every 2 seconds (default: 15).
# Keeps window tab names (pane_current_path) up to date.
set -g status-interval 2

set -g status-left-length 30
set -g status-right-length 100

# Window tabs: index + dir ~ command.
# pane-label.sh handles the index prefix and sudo indicator (red bg "!").
set -g window-status-format ' #($TMUX_CONF_DIR/conf.d/pane-label.sh #{pane_pid} "#{b:pane_current_path}" "#W" "#I") '
set -g window-status-current-format ' #($TMUX_CONF_DIR/conf.d/pane-label.sh #{pane_pid} "#{b:pane_current_path}" "#W" "#I") '
set -g window-status-separator ''

# Apply colors from palette.
run-shell '"$TMUX_CONF_DIR/conf.d/theme-apply.sh"'
