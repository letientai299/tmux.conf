# vim: ft=tmux
# theme.conf — status line and window tab styling (Atom One Dark)
# Palette: https://github.com/atom/one-dark-syntax
# Docs: https://man.openbsd.org/tmux#STYLES
#        https://man.openbsd.org/tmux#window-status-format

# Refresh status line every 2 seconds (default: 15).
# Keeps window tab names (pane_current_path) up to date.
set -g status-interval 2

# Status bar background — dark red when tmux is running as root, otherwise
# neutral. Checked once at config load time via if-shell.
if-shell '[ "$(id -u)" -eq 0 ]' \
  'set -g status-style "bg=#5c2020,fg=#abb2bf"' \
  'set -g status-style "bg=#282c34,fg=#abb2bf"'

# Left: session name + single fixed-width (6 char) mode indicator.
# Priority: PREFIX > pane mode (COPY/TREE/VIEW/BUFR/CLNT) > ZOOM > NORMAL.
# All 5 tmux pane modes: copy-mode, view-mode, tree-mode, buffer-mode, client-mode.
set -g status-left ' [#{session_name}] #{?client_prefix,#[fg=#e06c75]PREFIX,#{?pane_in_mode,#{?#{==:#{pane_mode},copy-mode},#[fg=#c678dd] COPY ,#{?#{==:#{pane_mode},view-mode},#[fg=#56b6c2] VIEW ,#{?#{==:#{pane_mode},tree-mode},#[fg=#98c379] TREE ,#{?#{==:#{pane_mode},buffer-mode},#[fg=#e5c07b] BUFR ,#{?#{==:#{pane_mode},client-mode},#[fg=#e5c07b] CLNT ,#[fg=#c678dd] MODE }}}}},#{?window_zoomed_flag,#[fg=#e5c07b] ZOOM ,#[fg=#abb2bf]NORMAL}}} '
set -g status-left-style 'fg=#61afef,bold'
set -g status-left-length 40

# Right: hostname + clock.
set -g status-right '#H %H:%M '
set -g status-right-style 'fg=#abb2bf'

# Window tabs: show index and directory basename + command.
# Prefix with red "!" when the pane's shell has an active sudo child process.
# pgrep -xP checks for a direct child named exactly "sudo".
set -g window-status-format '#(pgrep -xP #{pane_pid} sudo >/dev/null 2>&1 && printf "#[bg=#5c2020,fg=#e06c75,bold] ! #[bg=#21252b,fg=#abb2bf,nobold]") #I: #{b:pane_current_path} ~ #W '
set -g window-status-current-format '#(pgrep -xP #{pane_pid} sudo >/dev/null 2>&1 && printf "#[bg=#5c2020,fg=#e06c75,bold] ! #[bg=#2c313a,fg=#c678dd,bold]") #I: #{b:pane_current_path} ~ #W '
set -g window-status-current-style 'bg=#2c313a,fg=#c678dd,bold'
set -g window-status-style 'bg=#21252b,fg=#abb2bf'
set -g window-status-separator ''

# Pane borders — subtle.
set -g pane-border-style 'fg=#3e4452'
set -g pane-active-border-style 'fg=#528bff'
