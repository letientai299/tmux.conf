# vim: ft=tmux
# tmux.conf — entry point
# Docs: https://man.openbsd.org/tmux

# --- Server options (-s) ---

# Remove delay after pressing Escape (default: 10ms since 3.4).
# Zero ensures instant mode switching in vi/neovim.
set -s escape-time 0

# Report modified keys using xterm-style CSI u sequences.
# Required for terminals/apps that need Ctrl/Shift/Alt key combos.
# https://man.openbsd.org/tmux#extended-keys
set -s extended-keys on

# Append terminal features for all terminal types:
#   RGB           - 24-bit true color
#   clipboard     - OSC 52 clipboard access
#   strikethrough - SGR 9 strikethrough rendering
#   usstyle       - styled underlines (curly, colored, etc.)
# https://man.openbsd.org/tmux#terminal-features
set -as terminal-features ',*:RGB:clipboard:strikethrough:usstyle'

# --- Global options (-g) ---

# Scrollback buffer (default: 2000).
set -g history-limit 50000

# How long status line messages are displayed in ms (default: 750).
set -g display-time 4000

# Pass focus-in/out events to programs running inside tmux.
# Required for vim's autoread, terminal cursor shape changes, etc.
# https://man.openbsd.org/tmux#focus-events
set -g focus-events on

# Enable mouse for pane selection, resizing, and scrollback.
set -g mouse on

# 1-indexed windows and panes — matches keyboard layout.
set -g base-index 1
set -g pane-base-index 1

# Close gaps in window numbering when a window is destroyed.
set -g renumber-windows on

# Vi-style keys in copy mode and choice modes.
set -g mode-keys vi

# Copy the SSH alias (sent by the client via `LC_SSH_ALIAS=%n`) into the
# session environment on attach so the status bar can show it via #{E:...}.
# Re-attaching from a different host refreshes the value.
# https://man.openbsd.org/tmux#update-environment
set -ga update-environment LC_SSH_ALIAS

set -g status-position bottom

# Allow programs in panes to send escape sequences through tmux to the
# outer terminal. Required for SIXEL images, kitty graphics protocol,
# and other terminal-specific features.
# https://man.openbsd.org/tmux#allow-passthrough
set -g allow-passthrough on

# --- Modules ---
# Source all conf.d/*.conf alphabetically. Each file handles one concern.
source-file ~/.config/tmux/conf.d/*.conf

# Machine-local overrides (silently skipped if absent).
source-file -q ~/.config/tmux/local.conf
