# tmux.conf — entry point
# Loaded via: tm (~/.local/bin/tm)

# Options (must load before conf.d modules)
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g focus-events on
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position bottom
set -s extended-keys on
set -as terminal-features ',*:RGB:clipboard:strikethrough:usstyle'

# Modules
run-shell 'tmux source-file "$TMUX_CONF_DIR/conf.d/"*.conf'

# Machine-local overrides
source-file -q ~/.config/tmux/local.conf
